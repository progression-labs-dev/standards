# TypeScript - Internal
# Strict checks for internal tools and services

# =============================================================================
# ESLint
# =============================================================================

[code.linting.eslint]
enabled = true
ignore = ["**/dist/**", "**/node_modules/**", "**/build/**"]
max-warnings = 0

[code.linting.eslint.rules]

# Code quality limits
"max-depth" = { severity = "error", max = 4 }
"max-params" = { severity = "error", max = 4 }
"max-lines-per-function" = { severity = "error", max = 100 }
"max-lines" = { severity = "error", max = 500 }
"complexity" = "error"
"no-console" = { severity = "error", allow = ["error", "warn"] }

# Core ESLint - Best practices
"eqeqeq" = "error"
"prefer-const" = "error"
"no-var" = "error"

# Core ESLint - Security
"no-eval" = "error"
"no-implied-eval" = "error"

# Core ESLint - Bug prevention
"array-callback-return" = "error"
"no-template-curly-in-string" = "error"
"consistent-return" = "error"

# Import plugin
"import/no-cycle" = { severity = "error", maxDepth = 2 }

# TypeScript-ESLint - Type safety
"@typescript-eslint/no-unused-vars" = { severity = "error", argsIgnorePattern = "^_", varsIgnorePattern = "^_" }
"@typescript-eslint/no-explicit-any" = "error"
"@typescript-eslint/no-non-null-assertion" = "error"

# =============================================================================
# TypeScript Compiler
# =============================================================================

[code.types.tsc]
enabled = true

[code.types.tsc.require]
strict = true
esModuleInterop = true
skipLibCheck = true
forceConsistentCasingInFileNames = true

# =============================================================================
# Security
# =============================================================================

[code.security.secrets]
enabled = true

[code.security.pnpmaudit]
enabled = true

[code.security.dotenv]
enabled = true

# =============================================================================
# Dead Code Detection
# =============================================================================

[code.unused.knip]
enabled = true

# =============================================================================
# Naming Conventions
# =============================================================================

[code.naming]
enabled = true

[[code.naming.rules]]
extensions = ["ts"]
file_case = "kebab-case"
folder_case = "kebab-case"

[[code.naming.rules]]
extensions = ["tsx"]
file_case = "kebab-case"
folder_case = "kebab-case"

# =============================================================================
# Disable Comments Detection
# =============================================================================

[code.quality.disable-comments]
enabled = true

# =============================================================================
# Dependencies
# =============================================================================

[code.dependencies]
enabled = true
forbidden_lockfiles = ["yarn.lock", "package-lock.json"]

# =============================================================================
# Imports
# =============================================================================

[code.imports]
enabled = true

[[code.imports.blocked]]
modules = ["node-fetch", "axios", "request"]
message = "Use built-in fetch"

# =============================================================================
# Testing
# =============================================================================

[code.testing]
enabled = true
no_network = true

# =============================================================================
# Coverage
# =============================================================================

[code.coverage_run]
enabled = true
min_threshold = 80
