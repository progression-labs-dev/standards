name: Standards

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  standards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: progression-labs-dev/github-actions/gcp-auth@main
        with:
          gcp-project: ${{ vars.GCP_PROJECT_ID }}
          gcp-project-number: ${{ vars.GCP_PROJECT_NUMBER }}
          configure-npm: "true"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Conform audit
        run: npx @progression-labs/conform audit

      - name: Conform check
        run: npx @progression-labs/conform check
