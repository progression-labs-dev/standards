name: Standards

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  standards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        id: gcp-auth
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com
          token_format: access_token

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure GCP Artifact Registry
        run: |
          REGISTRY_URL="https://europe-west2-npm.pkg.dev/progression-labs-platform/platform-npm-packages-registry-platform/"
          REGISTRY_HOST=$(echo "$REGISTRY_URL" | sed 's|https://||; s|/*$||')
          echo "@progression-labs:registry=${REGISTRY_URL}" >> ~/.npmrc
          echo "//${REGISTRY_HOST}/:_authToken=${{ steps.gcp-auth.outputs.access_token }}" >> ~/.npmrc

      - name: Conform audit
        run: npx @progression-labs/conform audit

      - name: Conform check
        run: npx @progression-labs/conform check
